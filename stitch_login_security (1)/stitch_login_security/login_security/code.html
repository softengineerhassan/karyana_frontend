<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Precision POS - Secure Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Manrope:wght@600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-container-highest": "#cdddfe",
                        "outline-variant": "#a2adc4",
                        "secondary-fixed": "#d5e3fd",
                        "on-primary-container": "#005b2a",
                        "on-tertiary-container": "#60136d",
                        "tertiary-container": "#f39cfb",
                        "on-surface": "#242f41",
                        "surface-container-lowest": "#ffffff",
                        "on-surface-variant": "#515c70",
                        "on-tertiary-fixed-variant": "#6a1f77",
                        "primary-container": "#50fa8c",
                        "primary-fixed": "#50fa8c",
                        "primary-dim": "#005d2b",
                        "surface": "#f4f6ff",
                        "surface-dim": "#c3d5f8",
                        "on-error-container": "#570008",
                        "on-tertiary-fixed": "#41004d",
                        "tertiary-fixed-dim": "#e48fed",
                        "tertiary-dim": "#7a2f86",
                        "error-container": "#fb5151",
                        "tertiary": "#883c93",
                        "surface-bright": "#f4f6ff",
                        "on-primary-fixed-variant": "#006630",
                        "surface-container": "#dee8ff",
                        "error": "#b31b25",
                        "inverse-surface": "#040e1f",
                        "inverse-on-surface": "#929db4",
                        "surface-container-high": "#d5e3ff",
                        "on-primary": "#cdffd3",
                        "on-secondary": "#eef3ff",
                        "on-tertiary": "#ffeefb",
                        "secondary": "#4e5c71",
                        "on-error": "#ffefee",
                        "secondary-container": "#d5e3fd",
                        "on-background": "#242f41",
                        "primary-fixed-dim": "#3deb80",
                        "surface-container-low": "#ecf1ff",
                        "on-secondary-fixed": "#324054",
                        "surface-variant": "#cdddfe",
                        "on-primary-fixed": "#00461f",
                        "tertiary-fixed": "#f39cfb",
                        "on-secondary-fixed-variant": "#4e5c71",
                        "error-dim": "#9f0519",
                        "primary": "#006a32",
                        "background": "#f4f6ff",
                        "secondary-fixed-dim": "#c7d5ee",
                        "on-secondary-container": "#455367",
                        "secondary-dim": "#425065",
                        "surface-tint": "#006a32"
                    },
                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: { "DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem" },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .auth-gradient {
            background: radial-gradient(circle at top left, #dee8ff 0%, #f4f6ff 100%);
        }
        .glass-panel {
            backdrop-filter: blur(12px);
            background: rgba(255, 255, 255, 0.7);
        }
    </style>
</head>
<body class="bg-surface font-body text-on-surface antialiased min-h-screen flex flex-col">
<main class="flex-grow flex items-center justify-center p-6 auth-gradient">
<!-- Login Card -->
<div class="w-full max-w-[440px] flex flex-col gap-8">
<!-- Brand Anchor -->
<div class="flex flex-col items-center text-center gap-2">
<div class="w-16 h-16 bg-primary-container rounded-xl flex items-center justify-center mb-2 shadow-sm">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="point_of_sale" style="font-variation-settings: 'FILL' 1;">point_of_sale</span>
</div>
<h1 class="font-headline font-extrabold text-3xl tracking-tight text-inverse-surface">Precision POS</h1>
<p class="text-on-surface-variant font-medium">Merchant Terminal Access</p>
</div>
<!-- Main Interactive Surface -->
<div class="bg-surface-container-lowest rounded-xl p-8 shadow-[0_20px_40px_rgba(36,47,65,0.06)] border border-white">
<form class="space-y-6">
<!-- Identity Input -->
<div class="space-y-2">
<label class="block text-sm font-semibold text-on-surface" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline" data-icon="mail">mail</span>
<input class="w-full pl-11 pr-4 py-3 bg-surface-container-low border-none rounded-xl focus:ring-2 focus:ring-primary transition-all text-on-surface placeholder:text-outline-variant" id="email" name="email" placeholder="manager@precisionpos.com" type="email"/>
</div>
</div>
<!-- Security Input -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="block text-sm font-semibold text-on-surface" for="password">Password</label>
<a class="text-xs font-bold text-primary hover:text-primary-dim transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline" data-icon="lock">lock</span>
<input class="w-full pl-11 pr-12 py-3 bg-surface-container-low border-none rounded-xl focus:ring-2 focus:ring-primary transition-all text-on-surface" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Persistence Toggle -->
<div class="flex items-center gap-2">
<input class="w-4 h-4 rounded-sm border-outline-variant text-primary focus:ring-primary" id="remember" type="checkbox"/>
<label class="text-sm font-medium text-on-surface-variant" for="remember">Remember this terminal</label>
</div>
<!-- Primary Execution -->
<button class="w-full py-4 bg-gradient-to-r from-primary to-primary-dim text-on-primary font-bold rounded-xl shadow-lg hover:shadow-primary/20 active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
<span>Sign In</span>
<span class="material-symbols-outlined text-xl" data-icon="login">login</span>
</button>
</form>
<!-- Alternative Journeys -->
<div class="mt-8 pt-6 border-t border-surface-container border-dashed space-y-4">
<div class="flex items-center justify-between">
<span class="text-sm text-on-surface-variant">New operator?</span>
<a class="text-sm font-bold text-primary hover:underline" href="#">Register</a>
</div>
<div class="flex items-center justify-between">
<span class="text-sm text-on-surface-variant">Multi-factor ready?</span>
<a class="text-sm font-bold text-primary flex items-center gap-1 hover:underline" href="#">
                            Verify OTP
                            <span class="material-symbols-outlined text-sm" data-icon="verified_user">verified_user</span>
</a>
</div>
</div>
</div>
<!-- Security Footer Anchor -->
<div class="flex flex-col items-center gap-4 text-center">
<div class="flex items-center gap-6">
<div class="flex items-center gap-2 text-outline text-xs">
<span class="material-symbols-outlined text-sm" data-icon="shield">shield</span>
<span>End-to-End Encrypted</span>
</div>
<div class="flex items-center gap-2 text-outline text-xs">
<span class="material-symbols-outlined text-sm" data-icon="gpp_good">gpp_good</span>
<span>PCI-DSS Compliant</span>
</div>
</div>
<p class="text-[10px] text-outline-variant uppercase tracking-widest font-bold">Precision Merchant v4.2.0 • Build 2024</p>
</div>
</div>
</main>
<!-- Decorative Aesthetic Background Element -->
<div class="fixed top-0 right-0 -z-10 w-1/3 h-screen opacity-10 pointer-events-none overflow-hidden hidden lg:block">
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-primary rounded-full blur-[120px]"></div>
<img alt="Modern retail store interior" class="w-full h-full object-cover" data-alt="blurred background image of a high-end minimalist boutique retail store with soft natural lighting and neutral colors" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDcLrB6iSjH1SDGTBk4EetwqywRKLl8YjXgYzmG7hH3duN69qggp1c62jEdvb2w_8xPqUx8MSryGyDIILazRy_VnqcyrFPtMxUx8g-bpZwuvgnXqaowNu3-frffKpIQbHXquUdoZo3kJDkrao_PPJHXvZD1HpfhF-odW7eNcah4uvnFyE6FGgmaoPM3xCuDA4t6u1IDHOEJXWKVM9j38IHqU_Dta58ikL20SSqasowjTUEIPzaoa0ChWOyGdkYiiRqFlWDyXkz_zrM"/>
</div>
</body></html>
